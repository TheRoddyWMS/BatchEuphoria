variables:
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

stages:
  - build

build:
  image: cimg/openjdk:17.0.19
  stage: build
  # Reuse Gradle files and caches between jobs
  cache:
    - key:
        files:
          - gradle/wrapper/gradle-wrapper.properties
      paths:
        - ~/.gradle/wrapper
    - key:
        files:
          - build.gradle
      paths:
        - ~/.gradle/caches
  variables:
    JAVA_OPTS: "-Xmx512m -XX:MaxMetaspaceSize=128m -Dfile.encoding=UTF-8 -XX:+UseSerialGC"
  script:
    - ./gradlew build test allBoms --no-daemon --no-parallel --max-workers=1
  artifacts:
    paths:
      - build/test-results/test
      - build/libs/*.jar
      - build/reports/cyclonedx/*
      - build/reports/tests/test/*
